name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # We are going back to basics but forcing these specific flags:
        protocol: ftp
        port: 21
        ftp-ssl: true
        # This is key: since you are jailed, leave server-dir blank or use ./
        server-dir: ./ 
        # Prevents the 'Data Socket' crash by forcing single-stream
        parallel: 1 
        # Ignore the metadata that usually causes permission errors
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**